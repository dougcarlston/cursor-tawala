# Outbound email — server-owned SMTP (provider-neutral).
# Docker/entrypoint may override via classpath:mail.properties.
# Secrets must never be committed; use env/secret files at deploy time.
mail.enabled=false
mail.host=
mail.port=587
mail.username=
mail.password=
mail.smtp.auth=true
mail.smtp.starttls=true
mail.smtp.starttls.required=true
mail.smtp.ssl.protocols=TLSv1.2
mail.smtp.timeout=10000
mail.smtp.connectiontimeout=10000
mail.from.address=noreply@localhost
mail.from.name=Tawala
mail.worker.enabled=true
mail.worker.intervalSeconds=15
mail.worker.batchSize=20
mail.worker.maxSecondsPerRun=30
mail.worker.staleSendingMinutes=15
