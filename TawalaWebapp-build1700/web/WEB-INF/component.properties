web.popular-choice-display.description=Displays the text of the most popular response choice to a specified multiple-choice question.
web.popular-choice-display.no-ranked-choices.message=No choices were ranked "{0}".

web.simple-list.name=SINGLE QUESTION LIST
web.simple-list.description=Displays a list showing all the responses to a fill-in-the-blank question or recorded values for a hidden field.
web.simple-list.no-data.message=No records were found.
parameter.simple-list_conditions.name=Show only responses from records
parameter.simple-list_conditions.description=Only the responses in records that match these conditions will be shown.

web.question-correlation-table.name=QUESTION CORRELATION TABLE
web.question-correlation-table.description=Displays a table showing the choices made by all respondents to a multiple choice question. The left-most column contains the names of the respondents (or any fill-in-the-blank or text field you choose to display). The other columns indicate which choices were selected. Optionally, a second multiple choice question can be designated to indicate the favored choice for each respondent.

web.itemization-table.name=MULTIPLE QUESTION LIST
web.itemization-table.description=Displays a table showing a list of responses to specified questions in a Form.
web.itemization-table.no-data.message=No records were found.

web.choice-tally-table.name=RESPONSE BAR GRAPH
web.choice-tally-table.description=Displays a bar graph showing both the number and percentage of each response to a multiple-choice question.
web.choice-tally-table.header-choice=Choice
web.choice-tally-table.header-count=Count
web.choice-tally-table.header-percentage=Percentage
web.choice-tally-table.no-data.message=There were no responses to this question.

parameter.choice-tally-table_field.name=Question
parameter.choice-tally-table_field.description=The multiple choice question whose number and percentage information you wish to show.

parameter.choice-tally-table_conditions.name=Include only the records
parameter.choice-tally-table_conditions.description=Only the records that match these conditions will be included in the calculation of the number and percentage values.

web.response-totals-table.name=RESPONSE TOTALS
web.response-totals-table.description=Displays a table showing the count of each response to a multiple-choice question.
web.response-totals-table.header-choice=Choice
web.response-totals-table.header-count=Count
web.response-totals-table.no-data.message=There were no responses to this question.

parameter.response-totals-table_layout-type.name=Table Layout
parameter.response-totals-table_layout-type.description=Determines the general layout of the RESPONSE TOTALS table. The "Tall" layout yields a table with "Choice" and "Count" columns. The "Wide" layout yields a table with "Choice" and "Count" rows.

layout.vertical=Tall
layout.horizontal=Wide

parameter.response-totals-table_field.name=Question
parameter.response-totals-table_field.description=The multiple choice question whose count values you wish to show.

parameter.response-totals-table_conditions.name=Include only the records
parameter.response-totals-table_conditions.description=Only the records that match these conditions will be included in the calculation of the count values.

parameter.question-correlation-table_question-field-name.name=Question with all choices
parameter.question-correlation-table_question-field-name.description=Drag-and-drop or double-click the multiple choice question whose responses you want to display in the table.

parameter.question-correlation-table_preferred-choice-field-name.name=Question with preferred choice
parameter.question-correlation-table_preferred-choice-field-name.description=Drag-and-drop or double click a second multiple choice question that indicates the respondents' preferred choice, if several choices are allowed in the first question above. (Example: The first question might ask respondents for all available dates for an event; the second question would ask for the preferred date.)

parameter.question-correlation-table_display-field-name.name=Field to display in left column
parameter.question-correlation-table_display-field-name.description=Drag-and-drop or double-click a fill-in-the-blank or hidden field that you want to have appear as the "record identifier" in the table. (Often this will be the name of the respondent.)

