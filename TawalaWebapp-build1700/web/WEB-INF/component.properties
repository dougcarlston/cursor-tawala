web.paypal-single-item-button.name=PAYPAL SINGLE ITEM PURCHASE BUTTON
web.paypal-single-item-button.description=Creates a button that allows you to sell a single item, request payment for services or receive a donation. Note: To use this function in your projects you must arrange for online payment support with Tawala Systems, Inc. Visit our website for further details.

