web.popular-choice-correlation-table.name=RANKED MULTIQUESTION RESPONSE LIST
web.popular-choice-correlation-table.description=Computes the most common response to a multiple-choice question and displays a list of the contents of an associated field for users who have chosen that response. It also compares the response choice of one multiple-choice question with a second multiple-choice question.
web.popular-choice-correlation-table.no-ranked-choices.message=No choices were ranked "{0}".

