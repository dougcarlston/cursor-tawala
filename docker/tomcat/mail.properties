# Local Compose defaults — Mailpit captures mail on the docker network.
# Override via TAWALA_MAIL_* env vars (entrypoint regenerates this file into the WAR).
mail.enabled=true
mail.host=mailpit
mail.port=1025
mail.username=
mail.password=
mail.smtp.auth=false
mail.smtp.starttls=false
mail.smtp.starttls.required=false
mail.smtp.ssl.protocols=TLSv1.2
mail.smtp.timeout=10000
mail.smtp.connectiontimeout=10000
mail.from.address=noreply@tawala.local
mail.from.name=Tawala Local
mail.worker.enabled=true
mail.worker.intervalSeconds=10
mail.worker.batchSize=20
mail.worker.maxSecondsPerRun=30
mail.worker.staleSendingMinutes=15
