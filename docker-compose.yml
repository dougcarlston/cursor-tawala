services:
  postgres:
    image: postgres:16
    container_name: tawala-postgres
    environment:
      POSTGRES_USER: tawala_admin
      POSTGRES_PASSWORD: tawala
      POSTGRES_DB: tawala
    ports:
      - "5432:5432"
    volumes:
      - tawala_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tawala_admin -d tawala"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional local capture sink: docker compose --profile mailpit up -d
  mailpit:
    image: axllent/mailpit:latest
    container_name: tawala-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped
    profiles:
      - mailpit

  tawala:
    build:
      context: .
      dockerfile: docker/tomcat/Dockerfile
    container_name: tawala-tomcat
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Owner Resend (or other) credentials — gitignored. Template: docker/tomcat/mail.env.example
    # Do not also set TAWALA_MAIL_* under environment: — that overrides env_file.
    # Without this file, entrypoint defaults to Mailpit (host=mailpit, port=1025).
    env_file:
      - path: .env.email.local
        required: false
    volumes:
      - tawala_lucene:/var/tawala/lucene
    restart: unless-stopped

volumes:
  tawala_pg_data:
  tawala_lucene:
