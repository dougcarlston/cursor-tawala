<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>Form Preview</title>
	<style type="text/css">
		body { font: 14pt Arial Bold; color: blue; }
    </style>

	<script type="text/javascript">
		function onRefreshClicked()
		{
			window.external.HTMLRefreshButton_Clicked();
		}
	</script>

</head>
<body>
	<div style="text-align: center;">
		<p>
			&nbsp;</p>
		<p style="color: red">
			An error occured while generating the preview</p>
		<p>
		$MESSAGE$
		</p>
		<p>
			<button id="refreshButton" onclick="onRefreshClicked()">
				Retry</button></p>
		<p>
			&nbsp;</p>
	</div>
</body>
</html>
